=name: Manual Release with Commit Message

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v9.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 获取完整历史以便获取提交信息

      - name: Get latest commit message
        id: commit_msg
        run: |
          echo "MSG=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: stats.lua
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: |
            ## ⭐ [![GitHub downloads](https://img.shields.io/github/downloads/${{ github.repository }}/${{ github.event.inputs.version }}/total?cacheSeconds=300)](https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version }})

            ### 更新内容
            ${{ steps.commit_msg.outputs.MSG }}
